services:
  neo4j:
    image: neo4j:5.12.0
    container_name: omni_ips_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/omni_ips_password
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  chromadb:
    image: chromadb/chroma:latest
    container_name: omni_ips_chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: omni_ips_backend
    ports:
      - "8080:8080"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=omni_ips_password
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000
    depends_on:
      - neo4j
      - chromadb
    volumes:
      - .:/app

volumes:
  neo4j_data:
  neo4j_logs:
  chroma_data:
